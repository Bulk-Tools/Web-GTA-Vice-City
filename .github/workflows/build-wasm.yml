name: Build C++ Engine to WebAssembly

on:
  push:
    branches: [ main, claude/add-cpp-engine-entry-point ]
    paths:
      - 'engine/**'
      - '.github/workflows/build-wasm.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'engine/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.56'
        actions-cache-folder: 'emsdk-cache'

    - name: Verify Emscripten installation
      run: |
        emcc --version
        em++ --version

    - name: Build WebAssembly module
      run: |
        cd engine
        mkdir -p build
        cd build
        emcmake cmake ..
        emmake make
        ls -lah

    - name: Prepare artifacts
      run: |
        mkdir -p public/wasm
        cp engine/build/engine.js public/wasm/
        cp engine/build/engine.wasm public/wasm/
        ls -lah public/wasm/

    - name: Upload WebAssembly artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-engine
        path: |
          public/wasm/engine.js
          public/wasm/engine.wasm
        retention-days: 90

    - name: Commit and push compiled Wasm (on main branch)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add public/wasm/
        git diff --staged --quiet || git commit -m "chore: auto-compile C++ engine to WebAssembly [skip ci]"
        git push
